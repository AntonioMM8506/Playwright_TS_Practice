# GitHub Actions Pipeline for Cucumber + Playwright

name: E2E Tests

on:
  push:
    branches: 
      - main
      - feature/**
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
        retryCount:
          description: 'Number of times to rerun failed tests'
          required: false
          default: '1'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      HEADLESS: 'true'
      BASE_URL: ${{ secrets.BASE_URL }}
      STANDARD_USER: ${{ secrets.STANDARD_USER }}
      LOCKEDOUT_USER: ${{ secrets.LOCKEDOUT_USER }}
      PROBLEM_USER: ${{ secrets.PROBLEM_USER }}
      PERFORMANCE_GLITCH_USER: ${{ secrets.PERFORMANCE_GLITCH_USER }}
      ERROR_USER: ${{ secrets.ERROR_USER }}
      VISUAL_USER: ${{ secrets.VISUAL_USER }}
      PASSWORD: ${{ secrets.PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run all Cucumber tests (initial)
        run: npm test
      - name: Upload test-results artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
      - name: Upload cucumber reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: cucumberReports
          path: cucumberReports/
      - name: Retry failed scenarios and upload retry-only reports
        if: always()
        run: |
          RETRY_COUNT=${{ github.event.inputs.retryCount || 1 }}
          for i in $(seq 1 $RETRY_COUNT); do
            if [ -s cucumberReports/@rerun.txt ]; then
              echo "Retry #$i: Running failed scenarios..."
              npx cucumber-js --config cucumber.config.js --retry 0 --format rerun:cucumberReports/@rerun.txt --format html:cucumberReports/cucumber-report-retry-$i.html --format json:cucumberReports/cucumber-report-retry-$i.json --format summary --format progress-bar --tags "not @ignore" --retry 0 --retryTagFilter "@rerun" --retry 0 --name "Retry $i"
              mkdir -p test-results/retry-$i
              cp test-results/* test-results/retry-$i/ || true
              mkdir -p cucumberReports/retry-$i
              cp cucumberReports/cucumber-report-retry-$i.* cucumberReports/retry-$i/ || true
              cp cucumberReports/@rerun.txt cucumberReports/retry-$i/ || true
              # Upload only retry-specific reports
              echo "Uploading retry-only reports for retry $i..."
              gh run upload-artifact --name cucumberReports-retry-$i cucumberReports/retry-$i/
              gh run upload-artifact --name test-results-retry-$i test-results/retry-$i/
            else
              echo "No failed scenarios to rerun."
              break
            fi
          done

      - name: Upload test-results artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

      - name: Upload cucumber reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: cucumberReports
          path: cucumberReports/

      - name: Install chartjs-node-canvas
        if: always()
        run: npm install chartjs-node-canvas
      - name: Generate Pie Chart Report
        if: always()
        run: node piechart.js
      - name: List cucumberReports directory
        if: always()
        run: ls -l cucumberReports
      - name: Print piechart.js error output
        if: always()
        run: cat cucumberReports/piechart.html || echo 'piechart.html not found'
      - name: Upload Pie Chart
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: cucumberPieChart
          path: cucumberReports/piechart.html
